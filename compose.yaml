version: "3.8"

services:
  mongo:
    image: mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: vishal

  app:
    build: .
    ports:
      - "5050:5050"
    depends_on:
      - mongo
    environment:
      MONGO_URL: mongodb://admin:vishal@mongo:27017

  mongo-express:
    image: mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: vishal
      ME_CONFIG_MONGODB_URL: mongodb://admin:vishal@mongo:27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: vishal



# To run or start: docker-compose up --build -d
# To stop: docker-compose down

# Frontend UI = http://localhost:5050
# Mongo Express UI = http://localhost:8081



